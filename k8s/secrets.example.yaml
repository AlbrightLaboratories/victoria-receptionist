# Example secret manifest. Do NOT commit a populated copy.
#
# Apply with:
#   kubectl create secret generic victoria-secrets \
#     --namespace=victoria \
#     --from-literal=database_url='postgresql://victoria:CHANGE_ME@postgres:5432/victoria' \
#     --from-literal=postgres_user='victoria' \
#     --from-literal=postgres_password='CHANGE_ME' \
#     --from-literal=gh_token='ghp_xxx_token_with_issues_write_scope' \
#     --from-literal=tavily_api_key='tvly-xxx-or-omit-for-searxng'
#
# Or apply this file after replacing CHANGE_ME values.

apiVersion: v1
kind: Secret
metadata:
  name: victoria-secrets
  namespace: victoria
type: Opaque
stringData:
  database_url: "postgresql://victoria:CHANGE_ME@postgres:5432/victoria"
  postgres_user: "victoria"
  postgres_password: "CHANGE_ME"
  # PAT scoped to `repo` on AlbrightLaboratories/albrightlaboratories-dot-com.
  # Used by Victoria's github_issues.py to file knowledge-gap issues.
  gh_token: "ghp_REPLACE_ME"
  # Optional — when set, web search uses Tavily. Otherwise falls back
  # to in-cluster SearXNG.
  tavily_api_key: ""
---
# Image pull secret for GHCR. The image is public by default in this
# repo's workflow, but if you flip the package to private you'll need
# this. Generate with:
#   kubectl create secret docker-registry ghcr-pull \
#     --namespace=victoria \
#     --docker-server=ghcr.io \
#     --docker-username=<gh-username> \
#     --docker-password=<gh-pat-with-read:packages>
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-pull
  namespace: victoria
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: "REPLACE_WITH_BASE64_DOCKERCONFIG_JSON"
